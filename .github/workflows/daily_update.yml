name: Daily Quiz Update

on:
  schedule:
    - cron: '0 15 * * *' # 日本時間の深夜0時00分に実行
  workflow_dispatch: # 手動で動かすボタン

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install google-genai

    - name: Run quiz generator
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python generate_quiz_automatic.py

    - name: Commit and Push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        # 1. まず、できたてのクイズデータを「整理（add & commit）」する
        git add quiz_data.json
        git commit -m "Update quiz data for $(date)" || echo "No changes to commit"
        # 2. その後で、千葉ちゃんが更新した最新のHTMLなどを取り込む
        git pull --rebase origin main
        # 3. 最後に全部まとめて保存！
        git push
