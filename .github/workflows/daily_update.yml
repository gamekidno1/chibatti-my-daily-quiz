name: Generate Daily Quiz

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        category: ["世界情勢", "日本の政治", "文化", "エンタテイメント", "ゲーム", "アニメ", "AI"]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        # 🚨 【超重要】ここで最新の公式パッケージ「google-genai」をインストールする！
        run: |
          python -m pip install --upgrade pip
          pip install google-genai

      - name: Run Quiz Generator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generate_quiz_automatic.py "${{ matrix.category }}"

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add quiz_data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update quiz data for ${{ matrix.category }}" && git push)
