name: Generate Daily Quiz

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 🛡️ ここでも書き込み権限を明示的に宣言！
    strategy:
      max-parallel: 1
      matrix:
        category: ["世界情勢", "日本の政治", "文化", "エンタテイメント", "ゲーム", "アニメ", "AI"]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -U google-genai

      - name: Run Quiz Generator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generate_quiz_automatic.py "${{ matrix.category }}"

      - name: Commit and Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "Quiz-Bot"
          git config --global user.email "bot@example.com"
          # 🚀 Claude先生直伝：トークン付きURLで認証を突破！
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/gamekidno1/chibatti-my-daily-quiz.git
          git add quiz_data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Scheduled Update: ${{ matrix.category }}" && git push)
