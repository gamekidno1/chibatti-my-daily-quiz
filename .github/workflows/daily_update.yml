name: Daily Quiz Update

on:
  schedule:
    - cron: '15 15 * * *' # 日本時間の深夜0時15分に実行（UTC基準）
  workflow_dispatch: # 手動で動かすボタンも一応作っておく

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # GitHubに書き込む許可

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install google-genai

    - name: Run quiz generator
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python generate_quiz_automatic.py

    - name: Commit and Push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add quiz_data.json
        git commit -m "Update quiz data for $(date)" || exit 0
        git push
