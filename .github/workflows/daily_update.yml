name: Daily Quiz Update

on:
  schedule:
    - cron: '0 15 * * *'   # 00:00 JST -> 世界情勢
    - cron: '30 15 * * *'  # 00:30 JST -> 日本情勢
    - cron: '0 16 * * *'   # 01:00 JST -> 文化
    - cron: '30 16 * * *'  # 01:30 JST -> エンタテイメント
    - cron: '0 17 * * *'   # 02:00 JST -> ゲーム
    - cron: '30 17 * * *'  # 02:30 JST -> アニメ
    - cron: '0 18 * * *'   # 03:00 JST -> AI
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -U google-generativeai

      - name: Run script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          H=$(date +%H)
          M=$(date +%M)
          if [ "$H" == "15" ] && [ "$M" == "00" ]; then CATEGORY="世界情勢"; fi
          if [ "$H" == "15" ] && [ "$M" == "30" ]; then CATEGORY="日本情勢"; fi
          if [ "$H" == "16" ] && [ "$M" == "00" ]; then CATEGORY="文化"; fi
          if [ "$H" == "16" ] && [ "$M" == "30" ]; then CATEGORY="エンタテイメント"; fi
          if [ "$H" == "17" ] && [ "$M" == "00" ]; then CATEGORY="ゲーム"; fi
          if [ "$H" == "17" ] && [ "$M" == "30" ]; then CATEGORY="アニメ"; fi
          if [ "$H" == "18" ] && [ "$M" == "00" ]; then CATEGORY="AI"; fi
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then CATEGORY="世界情勢"; fi

          if [ -n "$CATEGORY" ]; then
            python generate_quiz_automatic.py "$CATEGORY"
          fi

      - name: Commit and Push
        run: |
          git config --global user.name "Quiz-Bot"
          git config --global user.email "bot@example.com"
          git add quiz_data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Scheduled Update" && git push)
