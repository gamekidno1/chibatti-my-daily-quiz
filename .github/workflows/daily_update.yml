name: Generate Daily Quiz

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      max-parallel: 1
      matrix:
        category: ["世界情勢", "日本の政治", "文化", "エンタテイメント", "ゲーム", "アニメ", "AI"]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 🛡️ Rebaseするために全履歴を取得

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -U google-genai

      - name: Run Quiz Generator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generate_quiz_automatic.py "${{ matrix.category }}"

      - name: Commit and Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CATEGORY: ${{ matrix.category }}
        run: |
          git config --global user.name "Quiz-Bot"
          git config --global user.email "bot@example.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/gamekidno1/chibatti-my-daily-quiz.git
          git add quiz_data.json
          git diff --quiet && git diff --staged --quiet || {
            git commit -m "Scheduled Update: $CATEGORY"
            # 🚀 Claude先生直伝：最新を取り込んでから整列させてPush！
            git pull --rebase origin main
            git push
          }
