name: Daily Quiz Update

on:
  schedule:
    - cron: '10 09 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -U google-generativeai

      - name: Run script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python generate_quiz_automatic.py "世界情勢"

      - name: Commit and Push
        run: |
          git config --global user.name "Quiz-Update-Bot"
          git config --global user.email "bot@example.com"
          git add quiz_data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Debug Update: Final Auto-Model Test" && git push)
