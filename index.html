<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ちばっちの「今の世界がわかる」クイズ</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f0f2f5; color: #1c1e21; text-align: center; padding: 20px; margin: 0; }
        #app { max-width: 600px; margin: 40px auto; background: white; padding: 40px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
        h1 { font-size: 26px; color: #1877f2; margin-bottom: 10px; }
        p.intro { color: #606770; margin-bottom: 30px; }
        .btn { display: block; width: 100%; padding: 18px; margin: 12px 0; background-color: #1877f2; color: white; border: none; border-radius: 10px; font-size: 17px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:hover { background-color: #166fe5; transform: translateY(-2px); }
        .btn-choice { background-color: #f0f2f5; color: #1c1e21; border: 1px solid #dddfe2; text-align: left; font-weight: normal; }
        .btn-choice:hover { background-color: #e4e6eb; border-color: #ccd0d5; }
        .score-display { font-size: 20px; font-weight: bold; margin-bottom: 25px; color: #d0312d; }
        .explanation { background: #ebf5ff; padding: 20px; border-radius: 10px; margin-top: 20px; text-align: left; display: none; border-left: 5px solid #1877f2; }
        select { width: 100%; padding: 12px; font-size: 16px; margin-bottom: 25px; border-radius: 8px; border: 1px solid #dddfe2; }
        .hidden { display: none; }
        #q-number { color: #606770; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>
<div id="app">
    <div id="start-screen">
        <h1>🌍 ちばっちの「今の世界がわかる」クイズ</h1>
        <p class="intro">昨日起きた最新ニュースから10問連続出題！<br>難易度レベル1〜10を制覇して3000点を目指せ！</p>
        <select id="category-select">
            <option value="世界情勢">世界情勢</option>
            <option value="日本の政治">日本の政治</option>
            <option value="文化">文化</option>
            <option value="エンタテイメント">エンタテイメント</option>
            <option value="ゲーム">ゲーム</option>
            <option value="アニメ">アニメ</option>
            <option value="AI">AI</option>
        </select>
        <button class="btn" onclick="startGame()">クイズに挑戦する</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div id="q-number"></div>
        <div class="score-display">スコア: <span id="current-score">0</span></div>
        <p id="q-text" style="font-size: 20px; font-weight: bold; line-height: 1.5; margin-bottom: 30px;"></p>
        <div id="choices-container"></div>
        <div id="explanation-box" class="explanation">
            <h3 id="judge-result" style="margin-top:0;"></h3>
            <p id="explanation-text" style="line-height: 1.6;"></p>
            <button class="btn" onclick="nextQuestion()">次の難易度へ</button>
        </div>
    </div>

    <div id="result-screen" class="hidden">
        <h1>お疲れ様でした！</h1>
        <p>あなたの最終スコアは...</p>
        <h2 style="font-size: 48px; color: #d0312d; margin: 20px 0;"><span id="final-score">0</span> 点</h2>
        <p id="rank-msg" style="font-weight: bold; margin-bottom: 30px;"></p>
        <button class="btn" onclick="location.reload()">もう一度挑戦する</button>
    </div>
</div>

<script>
    const pointsCorrect = [5, 15, 30, 50, 100, 200, 350, 550, 700, 1000];
    const pointsWrong = [-1, -3, -8, -15, -30, -70, -130, -200, -500, -1000];
    let currentQuestions = [];
    let currentQIndex = 0;
    let score = 0;

    async function startGame() {
        try {
            const response = await fetch('quiz_data.json');
            const allQuizData = await response.json();
            const category = document.getElementById('category-select').value;
            const categoryData = allQuizData.filter(q => q.category === category);
            
            currentQuestions = [];
            // 【本番ロジック】各難易度(1〜10)から必ず1問ずつ選ぶ
            for (let d = 1; d <= 10; d++) {
                const diffQs = categoryData.filter(q => q.difficulty === d);
                if (diffQs.length > 0) {
                    currentQuestions.push(diffQs[Math.floor(Math.random() * diffQs.length)]);
                }
            }

            if (currentQuestions.length < 5) { // 最低5問は揃っていないとエラー
                return alert("まだデータが十分に揃っていません。深夜の自動生成を待つか、別のジャンルを選んでね！");
            }

            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            showQuestion();
        } catch (e) { alert("データの読み込みに失敗しました。"); }
    }

    function showQuestion() {
        const q = currentQuestions[currentQIndex];
        document.getElementById('explanation-box').style.display = 'none';
        document.getElementById('choices-container').style.display = 'block';
        document.getElementById('q-number').innerText = `Level ${q.difficulty} / 10`;
        document.getElementById('q-text').innerText = q.question;
        document.getElementById('current-score').innerText = score;

        const container = document.getElementById('choices-container');
        container.innerHTML = '';
        
        // 選択肢をランダムに並び替える
        const shuffledChoices = [...q.choices].sort(() => Math.random() - 0.5);

        shuffledChoices.forEach(c => {
            const b = document.createElement('button');
            b.className = 'btn btn-choice'; b.innerText = c;
            b.onclick = () => {
                document.getElementById('choices-container').style.display = 'none';
                document.getElementById('explanation-box').style.display = 'block';
                const isCorrect = c === q.answer;
                score += isCorrect ? pointsCorrect[currentQIndex] : pointsWrong[currentQIndex];
                document.getElementById('judge-result').innerText = isCorrect ? "🎉 正解！" : "😭 不正解... (正解: " + q.answer + ")";
                document.getElementById('judge-result').style.color = isCorrect ? "#27ae60" : "#e74c3c";
                document.getElementById('explanation-text').innerText = q.explanation;
                document.getElementById('current-score').innerText = score;
            };
            container.appendChild(b);
        });
    }

    function nextQuestion() {
        currentQIndex++;
        if (currentQIndex >= currentQuestions.length) {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
            let msg = score >= 2000 ? "神レベル！ニュース通すぎます！" : (score >= 1000 ? "すごい！かなり情勢に詳しいですね！" : "伸び代あり！明日も挑戦しよう！");
            document.getElementById('rank-msg').innerText = msg;
        } else { showQuestion(); }
    }
</script>
</body>
</html>
