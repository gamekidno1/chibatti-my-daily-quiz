<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ちばっちの「今の世界がわかる」クイズ</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f4f7f6; color: #333; text-align: center; padding: 20px; }
        #app { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { font-size: 24px; color: #2c3e50; }
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; background-color: #3498db; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; transition: 0.2s; }
        .btn:hover { background-color: #2980b9; }
        .btn-choice { background-color: #f8f9fa; color: #333; border: 2px solid #dee2e6; text-align: left; }
        .score-display { font-size: 18px; font-weight: bold; margin-bottom: 20px; color: #e74c3c; }
        .explanation { background: #e8f4f8; padding: 15px; border-radius: 8px; margin-top: 20px; text-align: left; display: none; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div id="app">
    <div id="start-screen">
        <h1>🌍 ちばっちの「今の世界がわかる」クイズ</h1>
        <p>最新ニュースからAIが生成！</p>
        <select id="category-select" style="width:100%; padding:10px; margin-bottom:20px; border-radius:8px;">
            <option value="世界情勢">世界情勢</option><option value="日本の政治">日本の政治</option>
            <option value="文化">文化</option><option value="エンタテイメント">エンタテイメント</option>
            <option value="ゲーム">ゲーム</option><option value="アニメ">アニメ</option><option value="AI">AI</option>
        </select>
        <button class="btn" onclick="startGame()">ゲームスタート！</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <h2 id="q-number"></h2>
        <div class="score-display">スコア: <span id="current-score">0</span> 点</div>
        <p id="q-text" style="font-size: 18px; font-weight: bold; margin-bottom: 20px;"></p>
        <div id="choices-container"></div>
        <div id="explanation-box" class="explanation">
            <h3 id="judge-result"></h3>
            <p id="explanation-text"></p>
            <button class="btn" onclick="nextQuestion()">次の問題へ</button>
        </div>
    </div>

    <div id="result-screen" class="hidden">
        <h1>ゲーム終了！</h1>
        <h2>最終スコア: <span id="final-score">0</span> 点</h2>
        <button class="btn" onclick="location.reload()">もう一度遊ぶ</button>
    </div>
</div>

<script>
    const pointsCorrect = [5, 15, 30, 50, 100, 200, 350, 550, 700, 1000];
    const pointsWrong = [-1, -3, -8, -15, -30, -70, -130, -200, -500, -1000];
    let currentQuestions = [];
    let currentQIndex = 0;
    let score = 0;

    async function startGame() {
        try {
            const response = await fetch('quiz_data.json');
            const allQuizData = await response.json();
            const category = document.getElementById('category-select').value;
            
            // 【簡易版ロジック】ある分だけかき集める
            let categoryData = allQuizData.filter(q => q.category === category);
            if (categoryData.length === 0) return alert("データが1問もありません！");

            // シャッフルして最大10問抜き出し、難易度順に並べる
            categoryData.sort(() => Math.random() - 0.5);
            currentQuestions = categoryData.slice(0, 10).sort((a, b) => a.difficulty - b.difficulty);

            currentQIndex = 0; score = 0;
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            showQuestion();
        } catch (e) { alert("quiz_data.jsonを読み込めないよ！"); }
    }

    function showQuestion() {
        const q = currentQuestions[currentQIndex];
        document.getElementById('explanation-box').style.display = 'none';
        document.getElementById('choices-container').style.display = 'block';
        document.getElementById('q-number').innerText = `第 ${currentQIndex + 1} 問 (難易度:${q.difficulty})`;
        document.getElementById('q-text').innerText = `Q. ${q.question}`;
        document.getElementById('current-score').innerText = score;

        const container = document.getElementById('choices-container');
        container.innerHTML = '';
        q.choices.forEach(c => {
            const b = document.createElement('button');
            b.className = 'btn btn-choice'; b.innerText = c;
            b.onclick = () => {
                document.getElementById('choices-container').style.display = 'none';
                document.getElementById('explanation-box').style.display = 'block';
                const isCorrect = c === q.answer;
                score += isCorrect ? pointsCorrect[currentQIndex] : pointsWrong[currentQIndex];
                document.getElementById('judge-result').innerText = isCorrect ? "🎉 正解！" : "😭 不正解...";
                document.getElementById('judge-result').style.color = isCorrect ? "#27ae60" : "#e74c3c";
                document.getElementById('explanation-text').innerText = q.explanation;
                document.getElementById('current-score').innerText = score;
            };
            container.appendChild(b);
        });
    }

    function nextQuestion() {
        currentQIndex++;
        if (currentQIndex >= currentQuestions.length) {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
        } else { showQuestion(); }
    }
</script>
</body>
</html>
